name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: docker build -f infra/docker/api.Dockerfile -t ${{ secrets.ECR_API_IMAGE }} .
      - run: docker build -f infra/docker/worker.Dockerfile -t ${{ secrets.ECR_WORKER_IMAGE }} .
      - run: docker build -f infra/docker/web.Dockerfile -t ${{ secrets.ECR_WEB_IMAGE }} .
      - run: aws ecs update-service --cluster tokenlens --service tokenlens-api --force-new-deployment
      - run: aws ecs update-service --cluster tokenlens --service tokenlens-worker --force-new-deployment
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'