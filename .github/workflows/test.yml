name: test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tokenlens
          POSTGRES_USER: tokenlens
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports: ["8123:8123"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://tokenlens:secret@localhost:5432/tokenlens
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://tokenlens:secret@localhost:5432/tokenlens
          REDIS_URL: redis://localhost:6379
          CLICKHOUSE_URL: http://localhost:8123
          JWT_SECRET: test-secret
      - run: python -m pip install -r apps/optimizer/requirements.txt && python -m pytest apps/optimizer/tests