version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tokenlens
      POSTGRES_USER: tokenlens
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse:/docker-entrypoint-initdb.d

  api:
    build:
      context: .
      dockerfile: ./infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - clickhouse
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: ./infra/docker/worker.Dockerfile
    depends_on:
      - postgres
      - redis
      - clickhouse
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  postgres_data:
  clickhouse_data:
